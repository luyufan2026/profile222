<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Liu Reng-Mazu</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: Georgia, serif;
      color: #333;
      background: #111;
    }
    .bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.5rem 0.75rem;
      font-size: 14px;
      background: rgba(248, 248, 248, 0.95);
      border-bottom: 1px solid #ddd;
    }
    .bar a { color: #333; text-decoration: none; }
    .bar a:hover { text-decoration: underline; }
    .bar .open-tab {
      margin-left: auto;
      font-size: 13px;
      color: #555;
    }
    .frame-wrap {
      position: fixed;
      top: 38px;
      left: 0;
      right: 0;
      bottom: 0;
      background: #fff;
    }
    .frame-wrap iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>
<body>
  <div class="bar">
    <a href="projectlist.html">← back</a>
    <a class="open-tab" href="https://spoint.netlify.app/" target="_blank" rel="noopener noreferrer">Open in new tab ↗</a>
  </div>
  <div class="frame-wrap">
    <iframe
      src="https://spoint.netlify.app/"
      title="Liu Reng-Mazu"
      loading="eager"
      allow="fullscreen"
      referrerpolicy="no-referrer-when-downgrade"
    ></iframe>
  </div>
</body>
</html>
