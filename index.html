<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>yufan</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; min-height: 100vh; }

    .bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    body {
      font-family: Georgia, serif;
      color: #333;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 2rem 1.5rem 3rem;
    }

    nav {
      margin-top: auto;
    }

    nav a {
      color: #333;
      text-decoration: none;
      font-size: 14px;
      margin-right: 1.5rem;
    }

    nav a:hover {
      text-decoration: underline;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: normal;
      letter-spacing: 0.02em;
      margin-bottom: 0.5rem;
    }

    .face-link {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      overflow: hidden;
      display: block;
    }
    .face-link img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .projects-link {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      overflow: hidden;
      display: block;
    }
    .projects-link img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <img class="bg" src="image/yufan.jpg" alt="">
  <a href="projectlist.html" class="projects-link" title="projects">
    <img src="image/xunjia.jpeg" alt="">
  </a>
  <a href="aboutme.html" class="face-link" title="about">
    <img src="image/me.jpg" alt="">
  </a>
  <h1>yufan</h1>
  <nav>
    <a href="aboutme.html">about</a>
    <a href="projectlist.html">projects</a>
  </nav>
</body>
</html>
