<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>projects</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { min-height: 100vh; }

    .bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    body {
      font-family: Georgia, serif;
      color: #333;
      padding: 2rem 1.5rem;
    }

    a { color: #333; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .back { margin-bottom: 2rem; font-size: 14px; }
    .back a:hover { text-decoration: none; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
      list-style: none;
    }

    .grid a {
      display: block;
      color: inherit;
      text-decoration: none;
    }

    .grid a:hover { text-decoration: none; }

    .card {
      aspect-ratio: 3/4;
      overflow: hidden;
      background: #2a2a2a;
      position: relative;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.85);
    }

    .card.gray {
      background: #4a4a4a;
    }

    .card.gray::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #3a3a3a;
    }

    .card-title {
      margin-top: 0.5rem;
      font-size: 14px;
      color: #fff;
    }
  </style>
</head>
<body>
  <img class="bg" src="image/beijing.jpg" alt="">
  <div class="back"><a href="index.html">← back</a></div>
  <ul class="grid">
    <li><a href="project1.html"><div class="card"><img src="image/xunjia.jpeg" alt=""></div><span class="card-title">ShuiJing 水金</span></a></li>
    <li><a href="project2.html"><div class="card"><img src="image/niu.jpg" alt=""></div><span class="card-title">眼神里 · 2023</span></a></li>
    <li><a href="project3.html"><div class="card"><img src="image/page1.jpg" alt=""></div><span class="card-title">机械之心（Mechanical Heart）</span></a></li>
    <li><a href="project4.html"><div class="card"><img src="image/screenshot10.jpg" alt=""></div><span class="card-title">路 · 2025</span></a></li>
    <li><a href="project5.html"><div class="card gray"></div><span class="card-title">Seeking Buddha.exe</span></a></li>
    <li><a href="project6.html"><div class="card gray"></div><span class="card-title">Firework Clock</span></a></li>
    <li><a href="project7.html"><div class="card gray"></div><span class="card-title">Lie Detector Camera</span></a></li>
    <li><a href="project8.html"><div class="card gray"></div><span class="card-title">Typographic Interpretation</span></a></li>
    <li><a href="project9.html"><div class="card gray"></div><span class="card-title">Drink + Scene Generator</span></a></li>
    <li><a href="project10.html"><div class="card gray"></div><span class="card-title">Liu Reng-Mazu</span></a></li>
  </ul>
</body>
</html>
